<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>3-Hour Focus Session</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0b0d12;
      --bg2: #111318;
      --bg3: #181b24;
      --border: #1f2330;
      --accent: #6c63ff;
      --green: #00d4aa;
      --yellow: #f7c948;
      --red: #ff6b6b;
      --text: #e8eaf0;
      --text2: #8b90a0;
      --text3: #454a5a;
      --font: 'Space Grotesk', sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 80px;
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -.5px;
      margin-bottom: 4px;
    }

    .header h1 span { color: var(--accent); }
    .header p { color: var(--text2); font-size: 14px; }

    /* ── SESSION TIMER ── */
    .session-card {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(135deg, #13152a 0%, #0f1520 100%);
      border: 1px solid rgba(108,99,255,.3);
      border-radius: 20px;
      padding: 28px;
      margin-bottom: 24px;
      text-align: center;
    }

    .timer-display {
      font-family: var(--mono);
      font-size: 52px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 4px;
      line-height: 1;
      margin: 12px 0;
      transition: color 0.3s;
    }

    .timer-display.warning { color: var(--yellow); }
    .timer-display.danger  { color: var(--red); }

    .timer-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text2); }

    /* Timer ring */
    .ring-container { position: relative; width: 160px; height: 160px; margin: 0 auto 16px; }
    .ring-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--bg3); stroke-width: 8; }
    .ring-fg { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round;
               stroke-dasharray: 440; stroke-dashoffset: 0; transition: stroke-dashoffset 1s linear, stroke 0.3s; }
    .ring-inner {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      text-align: center;
    }

    .timer-btns {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
    }

    .tbtn {
      padding: 10px 24px;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 13.5px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .tbtn-start { background: var(--accent); color: #fff; }
    .tbtn-start:hover { background: #5851e8; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108,99,255,.4); }
    .tbtn-pause { background: rgba(247,201,72,.15); border: 1px solid rgba(247,201,72,.3); color: var(--yellow); }
    .tbtn-pause:hover { background: rgba(247,201,72,.25); }
    .tbtn-reset { background: var(--bg3); border: 1px solid var(--border); color: var(--text2); }
    .tbtn-reset:hover { color: var(--red); border-color: rgba(255,107,107,.3); }

    /* session select */
    .session-select {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .sess-opt {
      padding: 6px 16px;
      border-radius: 8px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sess-opt:hover, .sess-opt.active {
      border-color: rgba(108,99,255,.4);
      color: var(--accent);
      background: rgba(108,99,255,.1);
    }

    .focus-topic-input {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      text-align: center;
      margin-top: 12px;
      transition: border-color 0.2s;
    }

    .focus-topic-input:focus { border-color: var(--accent); }
    .focus-topic-input::placeholder { color: var(--text3); }

    /* Progress segments */
    .session-segs {
      display: flex;
      gap: 6px;
      margin-top: 16px;
      justify-content: center;
    }

    .seg {
      flex: 1;
      max-width: 80px;
      height: 5px;
      border-radius: 99px;
      background: var(--bg3);
      border: 1px solid var(--border);
      transition: all 0.4s;
    }

    .seg.done { background: var(--green); border-color: var(--green); }
    .seg.active { background: var(--accent); border-color: var(--accent); animation: pulse-seg 1.5s infinite; }

    @keyframes pulse-seg { 0%,100%{opacity:1} 50%{opacity:.5} }

    /* ── TODO ── */
    .todo-wrap { width: 100%; max-width: 520px; }

    .todo-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .todo-header h2 { font-size: 16px; font-weight: 700; }
    .todo-stats { font-size: 11px; color: var(--text2); font-family: var(--mono); }

    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .todo-inp {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 16px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .todo-inp:focus { border-color: var(--accent); }
    .todo-inp::placeholder { color: var(--text3); }

    .add-btn {
      padding: 11px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: var(--font);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .add-btn:hover { background: #5851e8; transform: translateY(-1px); }

    /* Priority filter */
    .filter-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .f-chip {
      padding: 4px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      transition: all 0.2s;
    }

    .f-chip:hover, .f-chip.on { background: rgba(108,99,255,.15); border-color: rgba(108,99,255,.3); color: var(--accent); }
    .f-chip.clear-done { color: var(--red); }
    .f-chip.clear-done:hover { background: rgba(255,107,107,.12); border-color: rgba(255,107,107,.3); }

    /* Priority selector */
    .prio-sel {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .prio-btn {
      padding: 5px 14px;
      border-radius: 8px;
      font-size: 11.5px;
      font-weight: 700;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--bg3);
      color: var(--text2);
      transition: all 0.2s;
    }

    .prio-btn:hover { transform: translateY(-1px); }
    .prio-btn.p1 { color: var(--red); }
    .prio-btn.p1.on { background: rgba(255,107,107,.15); border-color: rgba(255,107,107,.3); }
    .prio-btn.p2 { color: var(--yellow); }
    .prio-btn.p2.on { background: rgba(247,201,72,.15); border-color: rgba(247,201,72,.3); }
    .prio-btn.p3 { color: var(--green); }
    .prio-btn.p3.on { background: rgba(0,212,170,.15); border-color: rgba(0,212,170,.3); }

    /* Todo items */
    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      transition: all 0.25s;
      animation: slideIn 0.25s ease;
    }

    @keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    .todo-item:hover { border-color: rgba(108,99,255,.25); }
    .todo-item.done { opacity: 0.55; }
    .todo-item.done .todo-text { text-decoration: line-through; color: var(--text2); }

    .todo-cb {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 11px;
    }

    .todo-cb:hover { border-color: var(--accent); }
    .todo-item.done .todo-cb { background: var(--green); border-color: var(--green); }

    .todo-text { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }

    .todo-prio-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .todo-del {
      background: none;
      border: none;
      color: var(--text3);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 4px;
      border-radius: 4px;
      transition: all 0.2s;
    }

    .todo-del:hover { color: var(--red); background: rgba(255,107,107,.1); }

    /* Pomodoro sessions log */
    .sessions-log {
      width: 100%;
      max-width: 520px;
      margin-top: 24px;
    }

    .sessions-log h3 { font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }

    .log-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12.5px;
      color: var(--text2);
      margin-bottom: 6px;
    }

    .log-topic { flex: 1; color: var(--text); font-weight: 500; }
    .log-dur { font-family: var(--mono); font-size: 11px; color: var(--accent); }
    .log-time { font-family: var(--mono); font-size: 10px; color: var(--text3); }

    /* Completed banner */
    .complete-banner {
      display: none;
      text-align: center;
      padding: 20px;
      background: rgba(0,212,170,.08);
      border: 1px solid rgba(0,212,170,.25);
      border-radius: 14px;
      margin-bottom: 16px;
    }

    .complete-banner.show { display: block; animation: pop 0.4s ease; }

    @keyframes pop { 0%{transform:scale(.8);opacity:0} 100%{transform:scale(1);opacity:1} }

    .complete-banner .emoji { font-size: 40px; margin-bottom: 8px; }
    .complete-banner h2 { font-size: 20px; font-weight: 700; color: var(--green); }
    .complete-banner p { font-size: 13px; color: var(--text2); margin-top: 4px; }

    /* Empty state */
    .empty { text-align: center; padding: 32px; color: var(--text3); font-size: 13px; }
    .empty .e-icon { font-size: 32px; margin-bottom: 8px; }

    @media (max-width: 600px) {
      .timer-display { font-size: 40px; }
      .ring-container { width: 130px; height: 130px; }
    }
  </style>
</head>
<body>
  <a href="index.html" class="tbtn tbtn-reset" style="position: fixed; top: 20px; left: 20px; z-index: 1000; text-decoration: none; display: flex; align-items: center; gap: 8px;">
    <i class="fas fa-arrow-left"></i> Dashboard
  </a>

  <div class="header">
    <h1>⚡ <span>3-Hour</span> Focus Session</h1>
    <p>DSA + Coding · Deep work, zero distractions.</p>
  </div>

  <!-- Timer Card -->
  <div class="session-card">
    <div class="complete-banner" id="complete-banner">
      <div class="emoji">🏆</div>
      <h2>Session Complete!</h2>
      <p>Great work! Take a 5-min break, then crush the next session.</p>
    </div>

    <div class="session-select">
      <span class="sess-opt active" data-mins="25" onclick="selectDuration(this)">25 min</span>
      <span class="sess-opt" data-mins="45" onclick="selectDuration(this)">45 min</span>
      <span class="sess-opt" data-mins="60" onclick="selectDuration(this)">60 min</span>
      <span class="sess-opt" data-mins="90" onclick="selectDuration(this)">90 min</span>
      <span class="sess-opt" data-mins="180" onclick="selectDuration(this)">3 hr</span>
    </div>

    <div class="ring-container">
      <svg class="ring-svg" viewBox="0 0 160 160">
        <circle class="ring-bg" cx="80" cy="80" r="70"/>
        <circle class="ring-fg" id="timer-ring" cx="80" cy="80" r="70"/>
      </svg>
      <div class="ring-inner">
        <div class="timer-display" id="timer-display">25:00</div>
        <div class="timer-label" id="timer-label">Focus Time</div>
      </div>
    </div>

    <div class="session-segs" id="session-segs"></div>

    <input type="text" class="focus-topic-input" id="focus-topic" placeholder="What are you working on? e.g. Arrays — Two Sum"/>

    <div class="timer-btns">
      <button class="tbtn tbtn-start" id="start-btn" onclick="toggleTimer()">▶ Start</button>
      <button class="tbtn tbtn-reset" onclick="resetTimer()">↺ Reset</button>
    </div>
  </div>

  <!-- Todo -->
  <div class="todo-wrap">
    <div class="todo-header">
      <h2>📋 Session Tasks</h2>
      <span class="todo-stats" id="todo-stats">0 / 0</span>
    </div>

    <!-- Priority selector -->
    <div class="prio-sel">
      <span style="font-size:12px;color:var(--text2);align-self:center;margin-right:4px">Priority:</span>
      <button class="prio-btn p1 on" data-p="high" onclick="setPrio(this)">🔴 High</button>
      <button class="prio-btn p2" data-p="med" onclick="setPrio(this)">🟡 Medium</button>
      <button class="prio-btn p3" data-p="low" onclick="setPrio(this)">🟢 Low</button>
    </div>

    <div class="add-form">
      <input type="text" class="todo-inp" id="todo-inp" placeholder="Add a task e.g. Solve Two Sum on LeetCode" onkeydown="if(event.key==='Enter')addTodo()"/>
      <button class="add-btn" onclick="addTodo()">+</button>
    </div>

    <div class="filter-row">
      <span class="f-chip on" data-f="all" onclick="filterTodos(this)">All</span>
      <span class="f-chip" data-f="active" onclick="filterTodos(this)">Active</span>
      <span class="f-chip" data-f="done" onclick="filterTodos(this)">Done</span>
      <span class="f-chip" data-f="high" onclick="filterTodos(this)">🔴 High</span>
      <span class="f-chip clear-done" onclick="clearDone()">Clear Done</span>
    </div>

    <div class="todo-list" id="todo-list"></div>
  </div>

  <!-- Sessions Log -->
  <div class="sessions-log">
    <h3>Session Log</h3>
    <div id="sessions-log-list"></div>
  </div>

<script>
// ── STATE ──
let todos = JSON.parse(localStorage.getItem('focus_todos') || '[]');
let sessionLog = JSON.parse(localStorage.getItem('focus_sessions') || '[]');
let selectedPrio = 'high';
let todoFilter = 'all';

// Timer state
let totalSecs = 25 * 60;
let secsLeft = totalSecs;
let running = false;
let interval = null;
let completedSessions = 0;
const RING_CIRC = 440; // 2πr ≈ 2*3.14159*70

// ── TIMER ──
function selectDuration(el) {
  if (running) return;
  document.querySelectorAll('.sess-opt').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  totalSecs = parseInt(el.dataset.mins) * 60;
  secsLeft = totalSecs;
  updateTimerDisplay();
  renderSegs();
}

function toggleTimer() {
  if (running) { pauseTimer(); }
  else { startTimer(); }
}

function startTimer() {
  running = true;
  document.getElementById('start-btn').textContent = '⏸ Pause';
  document.getElementById('start-btn').className = 'tbtn tbtn-pause';
  document.getElementById('complete-banner').classList.remove('show');
  interval = setInterval(tick, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(interval);
  document.getElementById('start-btn').textContent = '▶ Resume';
  document.getElementById('start-btn').className = 'tbtn tbtn-start';
}

function resetTimer() {
  running = false;
  clearInterval(interval);
  secsLeft = totalSecs;
  document.getElementById('start-btn').textContent = '▶ Start';
  document.getElementById('start-btn').className = 'tbtn tbtn-start';
  updateTimerDisplay();
  updateRing();
}

function tick() {
  if (secsLeft <= 0) {
    clearInterval(interval);
    running = false;
    sessionComplete();
    return;
  }
  secsLeft--;
  updateTimerDisplay();
  updateRing();
}

function updateTimerDisplay() {
  const m = Math.floor(secsLeft / 60).toString().padStart(2, '0');
  const s = (secsLeft % 60).toString().padStart(2, '0');
  const el = document.getElementById('timer-display');
  el.textContent = `${m}:${s}`;
  el.className = 'timer-display';
  const pct = secsLeft / totalSecs;
  if (pct < 0.1) el.classList.add('danger');
  else if (pct < 0.25) el.classList.add('warning');
  updateRing();
}

function updateRing() {
  const pct = secsLeft / totalSecs;
  const offset = RING_CIRC * (1 - pct);
  const ring = document.getElementById('timer-ring');
  ring.style.strokeDashoffset = offset;
  ring.style.stroke = pct < 0.1 ? 'var(--red)' : pct < 0.25 ? 'var(--yellow)' : 'var(--accent)';
}

function sessionComplete() {
  completedSessions++;
  const topic = document.getElementById('focus-topic').value || 'Focus Session';
  const dur = Math.round(totalSecs / 60);
  sessionLog.unshift({ topic, dur, time: new Date().toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit'}) });
  if (sessionLog.length > 10) sessionLog.pop();
  localStorage.setItem('focus_sessions', JSON.stringify(sessionLog));
  renderSessionLog();

  document.getElementById('complete-banner').classList.add('show');
  document.getElementById('start-btn').textContent = '▶ Start';
  document.getElementById('start-btn').className = 'tbtn tbtn-start';
  secsLeft = totalSecs;
  updateTimerDisplay();
  renderSegs();

  // Browser notification
  if (Notification.permission === 'granted') {
    new Notification('⏱️ Session Complete!', { body: `${dur} min session done. Great work!` });
  } else if (Notification.permission !== 'denied') {
    Notification.requestPermission();
  }
}

function renderSegs() {
  const el = document.getElementById('session-segs');
  const total3hr = Math.round(3 * 60 / (totalSecs / 60));
  el.innerHTML = Array.from({ length: total3hr }, (_, i) => `
    <div class="seg ${i < completedSessions ? 'done' : i === completedSessions ? 'active' : ''}"></div>
  `).join('');
}

// ── TODOS ──
function setPrio(btn) {
  selectedPrio = btn.dataset.p;
  document.querySelectorAll('.prio-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function addTodo() {
  const text = document.getElementById('todo-inp').value.trim();
  if (!text) return;
  todos.unshift({ id: Date.now(), text, done: false, prio: selectedPrio, ts: Date.now() });
  document.getElementById('todo-inp').value = '';
  saveTodos();
  renderTodos();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTodos();
  renderTodos();
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  saveTodos();
  renderTodos();
}

function clearDone() {
  todos = todos.filter(t => !t.done);
  saveTodos();
  renderTodos();
}

function filterTodos(chip) {
  todoFilter = chip.dataset.f;
  document.querySelectorAll('.f-chip[data-f]').forEach(c => c.classList.remove('on'));
  chip.classList.add('on');
  renderTodos();
}

function saveTodos() {
  localStorage.setItem('focus_todos', JSON.stringify(todos));
}

const PRIO_COLOR = { high: 'var(--red)', med: 'var(--yellow)', low: 'var(--green)' };
const PRIO_ORDER = { high: 0, med: 1, low: 2 };

function renderTodos() {
  const list = document.getElementById('todo-list');
  const total = todos.length;
  const done = todos.filter(t => t.done).length;
  document.getElementById('todo-stats').textContent = `${done} / ${total} done`;

  let filtered = [...todos].sort((a, b) => PRIO_ORDER[a.prio] - PRIO_ORDER[b.prio]);

  if (todoFilter === 'active') filtered = filtered.filter(t => !t.done);
  else if (todoFilter === 'done') filtered = filtered.filter(t => t.done);
  else if (todoFilter === 'high') filtered = filtered.filter(t => t.prio === 'high');

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="e-icon">📭</div>No tasks here. Add something to focus on!</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="todo-item ${t.done ? 'done' : ''}">
      <div class="todo-cb" onclick="toggleTodo(${t.id})">${t.done ? '✓' : ''}</div>
      <div class="todo-prio-dot" style="background:${PRIO_COLOR[t.prio]}"></div>
      <span class="todo-text">${escHtml(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo(${t.id})">✕</button>
    </div>
  `).join('');
}

function renderSessionLog() {
  const el = document.getElementById('sessions-log-list');
  if (!sessionLog.length) {
    el.innerHTML = `<div style="color:var(--text3);font-size:12px;text-align:center;padding:16px">No sessions completed yet.</div>`;
    return;
  }
  el.innerHTML = sessionLog.map((s, i) => `
    <div class="log-item">
      <span style="color:var(--text3);font-family:var(--mono);font-size:11px">#${sessionLog.length - i}</span>
      <span class="log-topic">${escHtml(s.topic)}</span>
      <span class="log-dur">${s.dur}min</span>
      <span class="log-time">${s.time}</span>
    </div>
  `).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── INIT ──
updateTimerDisplay();
renderSegs();
renderTodos();
renderSessionLog();
</script>
</body>
</html>
