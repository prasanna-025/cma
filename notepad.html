<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PlacementOS — Interactive Notepad</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <!-- Font & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    :root {
      --bg: #0b0e14;
      --card-bg: rgba(16, 19, 28, 0.65);
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-mute: #a4b0be;
      --accent: #6c63ff;
      --accent2: #00d4aa;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
      position: relative;
    }

    /* Aurora Drift Backgrounds */
    .aurora {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(150px);
      z-index: -1;
      opacity: 0.15;
      pointer-events: none;
      animation: drift 20s infinite alternate ease-in-out;
    }
    .aurora-1 {
      background: var(--accent);
      top: -10%;
      left: -10%;
    }
    .aurora-2 {
      background: var(--accent2);
      bottom: -10%;
      right: -10%;
    }
    @keyframes drift {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.2); }
    }

    /* Editor Wrapper */
    .notepad-container {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Header styling */
    .notepad-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .topic-details h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 0%, var(--text-mute) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topic-details p {
      font-size: 13px;
      color: var(--accent2);
      margin-top: 4px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* Styled buttons */
    .btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      color: #fff;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }
    .btn-primary {
      background: var(--accent);
      border-color: transparent;
    }
    .btn-primary:hover {
      background: #5b52e6;
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.4);
    }
    .btn-success {
      background: rgba(0, 212, 170, 0.1);
      border-color: rgba(0, 212, 170, 0.2);
      color: var(--accent2);
    }
    .btn-success:hover {
      background: rgba(0, 212, 170, 0.2);
    }

    /* Notepad Lined Paper Leaf */
    .notepad-leaf {
      background: linear-gradient(135deg, #fffcf0 0%, #fff7d6 100%);
      border-left: 30px solid #ff7675;
      border-radius: 8px;
      box-shadow: inset 0 0 40px rgba(0,0,0,0.05), 3px 5px 15px rgba(0,0,0,0.3);
      padding: 20px 20px 20px 10px;
      position: relative;
      min-height: 450px;
      display: flex;
      flex-direction: column;
    }

    /* Binder rings aesthetic on top */
    .notepad-leaf::before {
      content: '';
      position: absolute;
      top: 0;
      left: -20px;
      width: 10px;
      height: 100%;
      background-image: radial-gradient(circle, #2d3436 4px, transparent 5px);
      background-size: 100% 30px;
      opacity: 0.15;
    }

    /* Textarea aligned with paper lines */
    .notepad-textarea {
      width: 100%;
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #2d3436;
      line-height: 28px;
      resize: none;
      background-image: linear-gradient(#e5dbad 1px, transparent 1px);
      background-size: 100% 28px;
      padding: 0;
      tab-size: 4;
    }

    /* Chat Link row */
    .link-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }
    .link-row label {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .link-input-group {
      display: flex;
      gap: 8px;
    }
    .link-input {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: #fff;
      padding: 10px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      outline: none;
    }
    .link-input:focus {
      border-color: var(--accent2);
      box-shadow: 0 0 10px rgba(0, 212, 170, 0.2);
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #00d4aa;
      color: #0b0e14;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 700;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0, 212, 170, 0.3);
      transform: translateY(150%);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 999;
    }
    .toast.show {
      transform: translateY(0);
    }

    .save-indicator {
      font-size: 12px;
      color: var(--text-mute);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .save-indicator i {
      color: var(--accent2);
    }
  </style>
</head>
<body>

  <div class="aurora aurora-1"></div>
  <div class="aurora aurora-2"></div>

  <div class="notepad-container">
    <!-- Header -->
    <div class="notepad-header">
      <div class="topic-details">
        <h1 id="topic-title">Loading Topic...</h1>
        <p id="category-subtitle">Loading Category...</p>
      </div>
      <div class="header-actions">
        <span class="save-indicator" id="save-status">
          <i class="fas fa-check-circle"></i> Synced with PlacementOS
        </span>
        <button class="btn btn-primary" onclick="saveNote()">
          <i class="fas fa-save"></i> Save Notes
        </button>
        <button class="btn btn-success" onclick="copyAIPrompt()" title="Quiz & Mock Interview Prompt">
          <i class="fas fa-robot"></i> Tutor
        </button>
        <button class="btn btn-success" style="background: rgba(108, 99, 255, 0.1); border-color: rgba(108, 99, 255, 0.2); color: #8c83ff;" onclick="optimizeNotesWithAI()" id="ai-enhance-btn" title="Enhance grammar & structure notes with AI">
          <i class="fas fa-magic"></i> Polished by AI
        </button>
        <button class="btn" onclick="promptApiKey()" style="padding: 10px;" title="Configure Gemini API Key">
          <i class="fas fa-cog"></i>
        </button>
      </div>
    </div>

    <!-- The Notepad Leaf -->
    <div class="notepad-leaf">
      <textarea id="notepad-text" class="notepad-textarea" placeholder="Start typing your structured notes here...&#10;Everything you write is saved automatically to PlacementOS!"></textarea>
    </div>

    <!-- ChatGPT Study Link -->
    <div class="link-row">
      <label for="chat-link"><i class="fas fa-link"></i> ChatGPT / Study Link</label>
      <div class="link-input-group">
        <input type="text" id="chat-link" class="link-input" placeholder="Paste your ChatGPT conversation link here...">
        <button class="btn" onclick="saveChatLink()">Link Thread</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i> <span id="toast-text">Notes Saved!</span>
  </div>

  <script>
    // State keys parsed from URL
    const params = new URLSearchParams(window.location.search);
    const category = params.get('category') || 'General';
    const topic = params.get('topic') || 'Study Topic';
    const stateKey = `${category}_${topic}`;

    // Elements
    const titleEl = document.getElementById('topic-title');
    const subEl = document.getElementById('category-subtitle');
    const textareaEl = document.getElementById('notepad-text');
    const linkEl = document.getElementById('chat-link');
    const saveStatusEl = document.getElementById('save-status');

    let S = {};

    // Load state
    function loadState() {
      const saved = localStorage.getItem('placementOS_v2');
      if (saved) {
        S = JSON.parse(saved);
      }
      if (!S.roadmapNotes) S.roadmapNotes = {};
      if (!S.roadmapLinks) S.roadmapLinks = {};
    }

    // Save state
    function saveState() {
      S.updatedAt = Date.now();
      localStorage.setItem('placementOS_v2', JSON.stringify(S));
    }

    // Initialize layout
    function init() {
      loadState();
      
      titleEl.textContent = topic;
      subEl.textContent = category;

      textareaEl.value = S.roadmapNotes[stateKey] || '';
      linkEl.value = S.roadmapLinks[stateKey] || '';

      // Setup auto-save listener
      let autoSaveTimer;
      textareaEl.addEventListener('input', () => {
        saveStatusEl.innerHTML = `<i class="fas fa-spinner fa-spin" style="color: var(--accent);"></i> Saving...`;
        clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
          autoSaveNote();
        }, 1000);
      });
    }

    // Auto-save note
    function autoSaveNote() {
      loadState();
      S.roadmapNotes[stateKey] = textareaEl.value;
      saveState();
      saveStatusEl.innerHTML = `<i class="fas fa-check-circle" style="color: var(--accent2);"></i> Auto-saved`;
    }

    // Manual Save Note
    function saveNote() {
      loadState();
      S.roadmapNotes[stateKey] = textareaEl.value;
      saveState();
      saveStatusEl.innerHTML = `<i class="fas fa-check-circle" style="color: var(--accent2);"></i> Saved & Synced`;
      showToast("Notes saved and synced!");
    }

    // Save Chat link
    function saveChatLink() {
      loadState();
      S.roadmapLinks[stateKey] = linkEl.value.trim();
      saveState();
      showToast("ChatGPT link updated!");
    }

    // Toast notification helper
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-text').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }

    // Copy AI tutor prompt
    function copyAIPrompt() {
      const promptText = `Act as an expert SDE interviewer and placement tutor. I am studying the topic "${topic}" under "${category}".
Please:
1. Briefly summarize the core, interview-critical concepts for this topic.
2. Provide 3 highly realistic, frequently-asked interview questions (with coding tasks if applicable).
3. Quiz me on them one by one. Ask the first question and wait for my response.`;
      
      navigator.clipboard.writeText(promptText).then(() => {
        showToast("📋 ChatGPT prompt copied!");
      });
    }

    // Configure API key
    function promptApiKey() {
      const current = localStorage.getItem('gemini_api_key') || '';
      const key = prompt("🔑 Configure Gemini API Key:\nEnter your Google Gemini API Key to enable instant AI polishing.\n\nDon't have one? You can get a free key from Google AI Studio.\nLeave blank to clear.", current);
      if (key === null) return;
      
      if (key.trim()) {
        localStorage.setItem('gemini_api_key', key.trim());
        showToast("Gemini API Key saved!");
      } else {
        localStorage.removeItem('gemini_api_key');
        showToast("Gemini API Key cleared.");
      }
    }

    // Enhance notes (Grammar, spelling & SDE structure optimization) with AI
    async function optimizeNotesWithAI() {
      const currentNotes = textareaEl.value.trim();
      if (!currentNotes) {
        showToast("⚠️ Write some notes first before enhancing!");
        return;
      }

      let apiKey = localStorage.getItem('gemini_api_key');
      if (!apiKey) {
        apiKey = prompt("🔑 Gemini API Key Required:\nTo instantly polish your notes on this page, enter your free Google Gemini API Key.\n\n(Get one for free at: https://aistudio.google.com/)\n\nPress Cancel to fall back to the manual ChatGPT copy-paste method.");
        if (!apiKey || !apiKey.trim()) {
          showToast("⚠️ Falling back to manual clipboard method...");
          fallbackManualAIPrompt(currentNotes);
          return;
        }
        localStorage.setItem('gemini_api_key', apiKey.trim());
        showToast("Gemini API Key saved!");
      }

      const btn = document.getElementById('ai-enhance-btn');
      const originalText = btn.innerHTML;
      
      // Update UI to loading state
      btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Polishing...`;
      btn.disabled = true;
      textareaEl.disabled = true;
      saveStatusEl.innerHTML = `<i class="fas fa-spinner fa-spin" style="color: var(--accent);"></i> AI is writing...`;

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            contents: [{
              parts: [{
                text: `Act as an SDE placement tutor and professional technical copywriter. Clean up the following study notes for the topic "${topic}" under "${category}".
Tasks:
1. Correct all grammar, spelling, and punctuation errors.
2. Re-structure the notes to make them extremely professional, clean, and highly understandable (use clear headers, bullet points, and code block formatting where helpful).
3. Do not shorten them excessively — retain all SDE-critical concepts and facts.
4. Output ONLY the final polished markdown notes. Do not include any intro, outro, or conversation.

Here are the notes to polish:
---
${currentNotes}
---`
              }]
            }]
          })
        });

        if (!response.ok) {
          let errorMsg = `HTTP Error ${response.status}`;
          try {
            const errData = await response.json();
            if (errData.error && errData.error.message) {
              errorMsg = errData.error.message;
            }
          } catch(e) {}
          throw new Error(errorMsg);
        }

        const data = await response.json();
        const polishedText = data.candidates?.[0]?.content?.parts?.[0]?.text;
        
        if (polishedText) {
          textareaEl.value = polishedText.trim();
          autoSaveNote(); // save to local storage
          showToast("✨ Notes successfully polished by AI!");
        } else {
          throw new Error("No response content received from API");
        }
      } catch (err) {
        console.error(err);
        let userMessage = err.message || "Unknown error";
        
        // Check for common local file CORS or network errors
        if (err instanceof TypeError && err.message.includes("Failed to fetch")) {
          userMessage = "Network error or CORS block. Browsers block direct API calls from local files (file://) due to security policies. Please use a local web server (like Live Server in VS Code) or use the ChatGPT fallback.";
        }
        
        alert(`❌ AI Polishing Failed:\n${userMessage}\n\nFalling back to manual ChatGPT clipboard method...`);
        fallbackManualAIPrompt(currentNotes);
      } finally {
        btn.innerHTML = originalText;
        btn.disabled = false;
        textareaEl.disabled = false;
      }
    }

    function fallbackManualAIPrompt(currentNotes) {
      const promptText = `Act as a professional technical editor and SDE placement tutor. Here are my raw study notes for the topic "${topic}" under "${category}":
---
${currentNotes}
---

Please:
1. Correct any grammar or spelling mistakes.
2. Re-structure the notes to make them highly understandable, clean, and professional (using bullet points and code block highlights if needed).
3. Keep it concise, comprehensive, and optimized for placement preparation.
Please output only the polished, final notes so that I can easily copy it back into my notepad.`;
      
      navigator.clipboard.writeText(promptText).then(() => {
        showToast("📋 Enhance prompt copied! Opening ChatGPT...");
        setTimeout(() => {
          window.open("https://chatgpt.com/?q=" + encodeURIComponent("I want to polish my study notes. I have copied my raw notes and instructions to my clipboard. Please ask me to paste it so you can correct the grammar and structure them."), "_blank");
        }, 800);
      });
    }

    // Start editor
    init();
  </script>
</body>
</html>
